<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кодовый замок</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@200;300;400&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', monospace;
            padding: 20px;
        }
        .container {
            text-align: center;
            transform: scale(1.4);
        }
        h1 {
            color: rgba(255,255,255,0.08);
            font-size: 24px;
            letter-spacing: 12px;
            font-weight: 200;
            margin-bottom: 5px;
        }
        .subtitle {
            color: rgba(255,255,255,0.04);
            font-size: 11px;
            letter-spacing: 6px;
            margin-bottom: 40px;
        }
        .locks {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .lock {
            background: rgba(255,255,255,0.02);
            padding: 14px 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.04);
            min-width: 70px;
            max-width: 85px;
            flex: 1;
            cursor: pointer;
        }
        .lock label {
            color: rgba(255,255,255,0.06);
            font-size: 10px;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 8px;
        }
        .lock input {
            width: 100%;
            height: 60px;
            font-size: 30px;
            font-family: 'Orbitron', monospace;
            text-align: center;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            color: rgba(255,255,255,0.4);
            outline: none;
            transition: 0.2s;
        }
        .lock input:focus {
            border-color: rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
        }
        .lock input.correct {
            border-color: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.2);
        }
        .lock input.wrong {
            border-color: rgba(255,50,50,0.1);
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .btn {
            background: rgba(255,255,255,0.02);
            color: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.04);
            padding: 14px 40px;
            font-size: 12px;
            font-family: 'Orbitron', monospace;
            letter-spacing: 5px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn:hover {
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.12);
        }
        .message {
            color: rgba(255,255,255,0.04);
            font-size: 12px;
            letter-spacing: 4px;
            margin-top: 20px;
            min-height: 24px;
            font-family: 'Orbitron', monospace;
        }
        .message.success {
            color: rgba(255,255,255,0.1);
        }
        .message.error {
            color: rgba(255,50,50,0.08);
        }
        .message.hint-show {
            color: rgba(255,215,0,0.08);
        }
        .hint {
            color: rgba(255,255,255,0.03);
            font-size: 10px;
            letter-spacing: 5px;
            margin-top: 18px;
            font-family: 'Orbitron', monospace;
        }
        .hint strong {
            color: rgba(255,255,255,0.04);
            font-weight: 300;
            letter-spacing: 6px;
        }
        .silk {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 2s ease;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.01) 0%, transparent 70%);
        }
        .silk.active {
            opacity: 1;
            animation: silkAnim 3s ease-out forwards;
        }
        @keyframes silkAnim {
            0% { background: radial-gradient(ellipse at center, rgba(255,255,255,0.02) 0%, transparent 40%); }
            100% { background: radial-gradient(ellipse at center, rgba(255,255,255,0.002) 60%, transparent 100%); }
        }
        @media (max-width: 500px) {
            .container { transform: scale(1); }
            .lock { min-width: 55px; max-width: 65px; }
            .lock input { height: 48px; font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="silk" id="silk"></div>

<div class="container">
    <h1>Кодовый замок</h1>
    <p class="subtitle">поверните колёса</p>

    <div class="locks">
        <div class="lock"><label>#1</label><input type="text" maxlength="1" id="d1" /></div>
        <div class="lock"><label>#2</label><input type="text" maxlength="1" id="d2" /></div>
        <div class="lock"><label>#3</label><input type="text" maxlength="1" id="d3" /></div>
        <div class="lock"><label>#4</label><input type="text" maxlength="1" id="d4" /></div>
        <div class="lock"><label>#5</label><input type="text" maxlength="1" id="d5" /></div>
    </div>

    <button class="btn" id="checkBtn">проверить</button>
    <div class="message" id="message">введите код</div>
    <div class="hint">подсказка: <strong>leon</strong></div>
</div>

<script>
// ============================================================
//  НОВАЯ ВЕРСИЯ — БЕЗ ОШИБОК
// ============================================================

// Получаем элементы
const d1 = document.getElementById('d1');
const d2 = document.getElementById('d2');
const d3 = document.getElementById('d3');
const d4 = document.getElementById('d4');
const d5 = document.getElementById('d5');
const allInputs = [d1, d2, d3, d4, d5];

const message = document.getElementById('message');
const checkBtn = document.getElementById('checkBtn');
const silk = document.getElementById('silk');

// ===== АВТОПЕРЕКЛЮЧЕНИЕ =====
allInputs.forEach(function(input, index) {
    // При вводе
    input.addEventListener('input', function() {
        // Оставляем только цифры
        this.value = this.value.replace(/\D/g, '');
        if (this.value === '') this.value = '0';
        if (parseInt(this.value) > 9) this.value = '9';
        if (parseInt(this.value) < 0) this.value = '0';
        
        // Переключаем на следующее
        if (this.value.length === 1 && index < allInputs.length - 1) {
            allInputs[index + 1].focus();
            allInputs[index + 1].select();
        }
    });

    // При нажатии клавиш
    input.addEventListener('keydown', function(e) {
        // Цифры
        if (e.key >= '0' && e.key <= '9') {
            this.value = e.key;
            if (index < allInputs.length - 1) {
                setTimeout(function() {
                    allInputs[index + 1].focus();
                    allInputs[index + 1].select();
                }, 5);
            }
            e.preventDefault();
        }
        
        // Backspace
        if (e.key === 'Backspace' && this.value === '0' && index > 0) {
            allInputs[index - 1].focus();
            allInputs[index - 1].select();
            e.preventDefault();
        }
        
        // Enter
        if (e.key === 'Enter') {
            checkCode();
            e.preventDefault();
        }
        
        // Стрелки
        if (e.key === 'ArrowLeft' && index > 0) {
            allInputs[index - 1].focus();
            allInputs[index - 1].select();
            e.preventDefault();
        }
        if (e.key === 'ArrowRight' && index < allInputs.length - 1) {
            allInputs[index + 1].focus();
            allInputs[index + 1].select();
            e.preventDefault();
        }
    });

    // При фокусе — выделяем
    input.addEventListener('focus', function() {
        this.select();
    });
});

// ===== ФУНКЦИЯ ПРОВЕРКИ =====
function checkCode() {
    // Собираем код
    var code = '';
    for (var i = 0; i < allInputs.length; i++) {
        code = code + allInputs[i].value;
    }
    
    // Убираем старые классы
    for (var i = 0; i < allInputs.length; i++) {
        allInputs[i].classList.remove('correct', 'wrong');
    }
    
    // Проверяем
    if (code === '11037') {
        // ✅ ПРАВИЛЬНО
        message.textContent = 'ящик открыт';
        message.className = 'message success';
        for (var i = 0; i < allInputs.length; i++) {
            allInputs[i].classList.add('correct');
        }
        
        // Эффект шёлка
        silk.classList.add('active');
        setTimeout(function() {
            silk.classList.remove('active');
        }, 3000);
        
        // Переход на secret.html
        setTimeout(function() {
            window.location.href = 'secret.html';
        }, 1500);
        
    } else {
        // ❌ НЕПРАВИЛЬНО
        message.textContent = 'неверный код';
        message.className = 'message error';
        for (var i = 0; i < allInputs.length; i++) {
            allInputs[i].classList.add('wrong');
        }
        
        setTimeout(function() {
            message.textContent = 'вспомните "leon"';
            message.className = 'message hint-show';
        }, 700);
        
        setTimeout(function() {
            for (var i = 0; i < allInputs.length; i++) {
                allInputs[i].classList.remove('wrong');
            }
        }, 400);
    }
}

// ===== КНОПКА =====
checkBtn.addEventListener('click', function() {
    checkCode();
});

// ===== СТАРТ =====
window.addEventListener('load', function() {
    setTimeout(function() {
        d1.focus();
        d1.select();
    }, 100);
});
</script>

</body>
</html>
