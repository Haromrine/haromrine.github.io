<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кодовый замок</title>
    
    <!-- ===== ПОДКЛЮЧЕНИЕ ШРИФТА ORBITRON ===== -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@200;300;400;600;700&display=swap" rel="stylesheet" />
    
    <style>
        /* ===== БАЗОВЫЙ СБРОС ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== ЖЁСТКОЕ ОТКЛЮЧЕНИЕ ВЫДЕЛЕНИЯ ===== */
        *,
        *::before,
        *::after {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            -khtml-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
        }

        /* ===== ОТКЛЮЧАЕМ ВСЁ ДЛЯ ПОЛЕЙ ВВОДА ===== */
        input,
        input::selection,
        input::-moz-selection,
        input::-webkit-selection {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            -khtml-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            background: transparent !important;
            color: rgba(255, 255, 255, 0.35) !important;
            text-shadow: none !important;
        }

        /* ===== УБИРАЕМ СИНЮЮ ОБВОДКУ ===== */
        input:focus,
        input:focus-visible,
        input:active {
            outline: none !important;
            outline-offset: 0 !important;
            box-shadow: none !important;
            border-color: rgba(255, 255, 255, 0.08) !important;
            -webkit-tap-highlight-color: transparent !important;
            background: rgba(255, 255, 255, 0.025) !important;
        }

        /* ===== УБИРАЕМ СИНЕЕ ВЫДЕЛЕНИЕ ТЕКСТА В ПОЛЕ ===== */
        input::selection {
            background: transparent !important;
            color: rgba(255, 255, 255, 0.35) !important;
        }
        input::-moz-selection {
            background: transparent !important;
            color: rgba(255, 255, 255, 0.35) !important;
        }
        input::-webkit-selection {
            background: transparent !important;
            color: rgba(255, 255, 255, 0.35) !important;
        }

        /* ===== УБИРАЕМ КУРСОР ВЫДЕЛЕНИЯ (текстовый курсор) ===== */
        input {
            caret-color: rgba(255, 255, 255, 0.02) !important;
        }

        /* ===== ПОЛНОСТЬЮ ЧЁРНЫЙ ФОН ===== */
        body {
            font-family: 'Orbitron', 'Segoe UI', monospace;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* ===== КОНТЕЙНЕР ===== */
        .container {
            max-width: 720px;
            width: 100%;
            text-align: center;
            position: relative;
            transform: scale(1.35);
            transform-origin: center center;
        }

        /* ===== ЗАГОЛОВОК ===== */
        h1 {
            color: rgba(255, 255, 255, 0.08);
            font-size: 28px;
            font-weight: 200;
            letter-spacing: 14px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.04);
            font-size: 13px;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 50px;
            font-weight: 200;
        }

        /* ===== ЗАМКИ ===== */
        .locks {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .lock {
            background: rgba(255, 255, 255, 0.015);
            padding: 18px 12px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            min-width: 80px;
            flex: 1;
            max-width: 100px;
            transition: 0.3s ease;
        }

        .lock:hover {
            border-color: rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
        }

        .lock label {
            color: rgba(255, 255, 255, 0.06);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            display: block;
            margin-bottom: 10px;
            font-weight: 200;
        }

        /* ===== СТИЛЬ КРУТИЛКИ ===== */
        .lock input {
            width: 100%;
            height: 68px;
            font-size: 34px;
            font-weight: 300;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.015);
            color: rgba(255, 255, 255, 0.35);
            outline: none !important;
            transition: 0.4s ease;
            -moz-appearance: textfield;
            font-family: 'Orbitron', monospace;
            caret-color: rgba(255, 255, 255, 0.02) !important;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            box-shadow: none !important;
        }

        .lock input::-webkit-outer-spin-button,
        .lock input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .lock input:focus {
            border-color: rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.025);
            color: rgba(255, 255, 255, 0.5);
            outline: none !important;
            box-shadow: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        /* ===== ПРАВИЛЬНО ===== */
        .lock input.correct {
            border-color: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.015);
        }

        /* ===== НЕПРАВИЛЬНО ===== */
        .lock input.wrong {
            border-color: rgba(255, 50, 50, 0.06);
            animation: gentleShake 0.3s ease;
        }

        @keyframes gentleShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* ===== КНОПКА ===== */
        .btn {
            background: rgba(255, 255, 255, 0.015);
            color: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 18px 50px;
            font-size: 15px;
            font-weight: 200;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.5s ease;
            letter-spacing: 6px;
            text-transform: uppercase;
            width: 100%;
            max-width: 340px;
            font-family: 'Orbitron', monospace;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.025);
            border-color: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.12);
        }

        /* ===== СООБЩЕНИЕ ===== */
        .message {
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.04);
            font-size: 14px;
            min-height: 26px;
            font-weight: 200;
            letter-spacing: 5px;
            transition: 0.8s ease;
            font-family: 'Orbitron', monospace;
        }

        .message.success {
            color: rgba(255, 255, 255, 0.08);
        }

        .message.error {
            color: rgba(255, 50, 50, 0.06);
        }

        .message.hint-show {
            color: rgba(255, 255, 255, 0.05);
        }

        /* ===== ПОДСКАЗКА ===== */
        .hint-bottom {
            margin-top: 22px;
            color: rgba(255, 255, 255, 0.03);
            font-size: 12px;
            letter-spacing: 6px;
            font-weight: 200;
            transition: 0.4s ease;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            cursor: default;
        }

        .hint-bottom:hover {
            color: rgba(255, 255, 255, 0.06);
        }

        .hint-bottom strong {
            font-weight: 300;
            color: rgba(255, 255, 255, 0.04);
            letter-spacing: 8px;
        }

        .hint-bottom:hover strong {
            color: rgba(255, 255, 255, 0.08);
        }

        /* ===== ЭФФЕКТ ШЁЛКА ===== */
        .silk-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 2s ease;
            background: 
                radial-gradient(ellipse at center, rgba(255, 255, 255, 0.008) 0%, transparent 70%);
        }

        .silk-overlay.active {
            opacity: 1;
            animation: silkRipple 3s ease-out forwards;
        }

        @keyframes silkRipple {
            0% {
                background: 
                    radial-gradient(ellipse at center, rgba(255, 255, 255, 0.015) 0%, transparent 40%);
            }
            30% {
                background: 
                    radial-gradient(ellipse at center, rgba(255, 255, 255, 0.01) 20%, transparent 60%);
            }
            70% {
                background: 
                    radial-gradient(ellipse at center, rgba(255, 255, 255, 0.006) 40%, transparent 80%);
            }
            100% {
                background: 
                    radial-gradient(ellipse at center, rgba(255, 255, 255, 0.002) 60%, transparent 100%);
            }
        }

        /* ===== ДЕКОР ===== */
        .footer {
            margin-top: 35px;
            color: rgba(255, 255, 255, 0.015);
            font-size: 11px;
            letter-spacing: 14px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 600px) {
            .container {
                transform: scale(1.0);
            }
            .lock {
                min-width: 60px;
                max-width: 72px;
                padding: 14px 8px 16px;
            }
            .lock input {
                height: 52px;
                font-size: 26px;
            }
            h1 {
                font-size: 20px;
                letter-spacing: 8px;
            }
            .btn {
                font-size: 12px;
                padding: 14px 30px;
                max-width: 280px;
            }
            .subtitle {
                font-size: 10px;
                letter-spacing: 5px;
                margin-bottom: 35px;
            }
            .hint-bottom {
                font-size: 10px;
                letter-spacing: 4px;
            }
            .message {
                font-size: 11px;
            }
        }

        @media (max-width: 420px) {
            .container {
                transform: scale(0.9);
            }
            .lock {
                min-width: 48px;
                max-width: 56px;
                padding: 10px 5px 12px;
            }
            .lock input {
                height: 42px;
                font-size: 20px;
            }
            h1 {
                font-size: 16px;
                letter-spacing: 5px;
            }
            .btn {
                font-size: 10px;
                padding: 12px 20px;
                max-width: 100%;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>

<!-- ===== ЭФФЕКТ ШЁЛКА ===== -->
<div class="silk-overlay" id="silkOverlay"></div>

<div class="container">

    <!-- ===== ЗАГОЛОВОК ===== -->
    <h1>Кодовый замок</h1>
    <p class="subtitle">поверните колёса</p>

    <!-- ===== 5 ЗАМКОВ ===== -->
    <div class="locks">
        <div class="lock">
            <label>#1</label>
            <input type="number" min="0" max="9" value="0" id="d1" />
        </div>
        <div class="lock">
            <label>#2</label>
            <input type="number" min="0" max="9" value="0" id="d2" />
        </div>
        <div class="lock">
            <label>#3</label>
            <input type="number" min="0" max="9" value="0" id="d3" />
        </div>
        <div class="lock">
            <label>#4</label>
            <input type="number" min="0" max="9" value="0" id="d4" />
        </div>
        <div class="lock">
            <label>#5</label>
            <input type="number" min="0" max="9" value="0" id="d5" />
        </div>
    </div>

    <!-- ===== КНОПКА ===== -->
    <button class="btn" id="checkBtn">проверить</button>

    <!-- ===== СООБЩЕНИЕ ===== -->
    <div class="message" id="message">введите код</div>

    <!-- ===== ПОДСКАЗКА ===== -->
    <div class="hint-bottom" id="hintBottom">
        подсказка: <strong>leon</strong>
    </div>

    <!-- ===== ДЕКОР ===== -->
    <div class="footer">✦ ✦ ✦</div>

</div>

<script>
    // ===============================
    //  НАСТРОЙКИ
    // ===============================
    const CORRECT_CODE = "11037";

    // ===============================
    //  ЭЛЕМЕНТЫ
    // ===============================
    const inputs = [
        document.getElementById("d1"),
        document.getElementById("d2"),
        document.getElementById("d3"),
        document.getElementById("d4"),
        document.getElementById("d5")
    ];
    const message = document.getElementById("message");
    const checkBtn = document.getElementById("checkBtn");
    const hintBottom = document.getElementById("hintBottom");
    const silkOverlay = document.getElementById("silkOverlay");

    // ===============================
    //  ОТКЛЮЧАЕМ ВЫДЕЛЕНИЕ ЧЕРЕЗ JS
    // ===============================
    function disableSelection(event) {
        event.preventDefault();
        return false;
    }

    // Запрещаем выделение на всех полях
    inputs.forEach(inp => {
        inp.addEventListener('select', disableSelection);
        inp.addEventListener('selectstart', disableSelection);
        inp.addEventListener('mousedown', function(e) {
            // Если клик был внутри поля — отменяем выделение
            this.style.userSelect = 'none';
            this.style.webkitUserSelect = 'none';
        });
        inp.addEventListener('mouseup', function(e) {
            // Сразу после клика убираем любое выделение
            this.setSelectionRange(0, 0);
        });
        inp.addEventListener('focus', function() {
            // При фокусе снимаем выделение
            this.setSelectionRange(0, 0);
        });
        inp.addEventListener('blur', function() {
            this.setSelectionRange(0, 0);
        });
    });

    // ===============================
    //  ФУНКЦИЯ ПРОВЕРКИ
    // ===============================
    function checkCode() {
        const entered = inputs.map(inp => inp.value).join("");

        inputs.forEach(inp => {
            inp.classList.remove("correct", "wrong");
            // Снимаем выделение
            inp.setSelectionRange(0, 0);
        });

        if (entered === CORRECT_CODE) {
            message.textContent = "ящик открыт";
            message.className = "message success";
            inputs.forEach(inp => inp.classList.add("correct"));

            silkOverlay.classList.add("active");
            setTimeout(() => {
                silkOverlay.classList.remove("active");
            }, 3000);

        } else {
            message.textContent = "неверный код";
            message.className = "message error";
            inputs.forEach(inp => inp.classList.add("wrong"));

            setTimeout(() => {
                message.textContent = 'вспомните "leon"';
                message.className = "message hint-show";
            }, 700);

            setTimeout(() => {
                inputs.forEach(inp => inp.classList.remove("wrong"));
            }, 400);
        }
    }

    // ===============================
    //  СОБЫТИЯ
    // ===============================

    checkBtn.addEventListener("click", checkCode);

    inputs.forEach((inp, index) => {
        inp.addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkCode();
        });

        inp.addEventListener("input", function() {
            if (this.value.length > 1) this.value = this.value.slice(-1);
            if (this.value < 0) this.value = 0;
            if (this.value > 9) this.value = 9;
            if (this.value === "") this.value = 0;

            // Снимаем выделение после ввода
            this.setSelectionRange(0, 0);

            if (this.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });
    });

    // Клик по подсказке
    hintBottom.addEventListener("click", function() {
        message.textContent = 'код связан с "leon"';
        message.className = "message hint-show";
        setTimeout(() => {
            if (message.className !== "message success" && message.className !== "message error") {
                message.textContent = 'введите код';
                message.className = "message";
            }
        }, 3500);
    });

    window.addEventListener("load", () => {
        inputs[0].focus();
    });
</script>

</body>
</html>
