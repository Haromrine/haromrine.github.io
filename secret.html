<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Секретное фото</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@200;300;400&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', monospace;
            padding: 20px;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: rgba(255,255,255,0.06);
            font-size: 18px;
            letter-spacing: 8px;
            font-weight: 200;
            margin-bottom: 30px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 2s ease forwards 2.5s;
        }
        .image-wrapper {
            width: 100%;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            opacity: 0;
            animation: fadeIn 3s ease forwards 1s;
        }
        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: rgba(255,255,255,0.04);
            font-size: 11px;
            letter-spacing: 4px;
            text-decoration: none;
            font-family: 'Orbitron', monospace;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.03);
            padding: 12px 30px;
            border-radius: 30px;
            opacity: 0;
            animation: fadeIn 2s ease forwards 3s;
        }
        .back-link:hover {
            color: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.06);
        }
        .silk {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 2s ease;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.01) 0%, transparent 70%);
        }
        .silk.active {
            opacity: 1;
            animation: silkAnim 3s ease-out forwards;
        }
        @keyframes silkAnim {
            0% { background: radial-gradient(ellipse at center, rgba(255,255,255,0.02) 0%, transparent 40%); }
            100% { background: radial-gradient(ellipse at center, rgba(255,255,255,0.002) 60%, transparent 100%); }
        }
        .footer {
            margin-top: 25px;
            color: rgba(255,255,255,0.015);
            font-size: 9px;
            letter-spacing: 10px;
            opacity: 0;
            animation: fadeIn 2s ease forwards 3.5s;
        }
        @media (max-width: 600px) {
            h1 { font-size: 14px; letter-spacing: 5px; }
        }
    </style>
</head>
<body>

<div class="silk active" id="silk"></div>

<div class="container">
    <h1>✦ Секретное фото ✦</h1>

    <div class="image-wrapper">
        <!-- ===== ФОТО ИЗ ПАПКИ ===== -->
        <img src="photo.jpg" alt="Секретное фото" />
    </div>

    <a href="https://haromrine.github.io" class="back-link">← Вернуться к замку</a>
    <div class="footer">✦ ✦ ✦</div>
</div>

<script>
    setTimeout(() => {
        const audio = new Audio();
        audio.src = 'sound.mp3';
        audio.volume = 0.4;
        audio.play().catch(() => {
            document.addEventListener('click', function playOnce() {
                audio.play();
                document.removeEventListener('click', playOnce);
            }, { once: true });
        });
    }, 2000);

    setTimeout(() => {
        document.getElementById('silk').classList.remove('active');
    }, 3000);
</script>

</body>
</html>
