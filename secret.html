<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        /* АБСОЛЮТНО НИЧЕГО НЕТ */
    </style>
</head>
<body>
    <!-- ПУСТОТА -->
    <script>
        // ===== ЗВУК ЧЕРЕЗ 2 СЕКУНДЫ =====
        setTimeout(function() {
            const audio = new Audio();
            audio.src = 'sound.mp3';
            audio.volume = 0.4;
            audio.play().catch(function() {
                // Если браузер блокирует — по клику
                document.addEventListener('click', function playOnce() {
                    audio.play();
                    document.removeEventListener('click', playOnce);
                }, { once: true });
            });
        }, 2000);
    </script>
</body>
</html>
